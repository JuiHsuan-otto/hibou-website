<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiBOU 喜福生活苑｜機能防風罩 (預覽測試版)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #7A9A7E; --moss: #4A6741; --cream: #FAF7F2; --warm-white: #FFFDF9; --charcoal: #2C2C2C; --gold: #C9A97A;
        }
        body { font-family: "Noto Sans TC", sans-serif; background-color: var(--warm-white); color: var(--charcoal); margin: 0; line-height: 1.8; }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .hero { padding: 100px 0; background: var(--cream); text-align: center; }
        .hero h1 { font-family: "Noto Serif TC", serif; font-size: 2.5rem; color: var(--moss); }
        .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; }
        .style-card { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .btn-buy { 
            display: inline-block; background: var(--moss); color: #fff; padding: 15px 40px; 
            border-radius: 50px; text-decoration: none; font-weight: 700; border: none; cursor: pointer;
            margin-top: 20px; font-size: 1.1rem;
        }
        .btn-buy:hover { background: var(--gold); }
        footer { text-align: center; padding: 50px 0; color: #999; font-size: 0.9rem; }
        
        /* 測試用的模擬表單 */
        #test-console { 
            position: fixed; bottom: 20px; right: 20px; width: 300px; background: #333; 
            color: #0f0; font-family: monospace; padding: 15px; border-radius: 5px; font-size: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); display: none;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="wrap">
            <h1>HiBOU 喜福機能防風罩</h1>
            <p>【模擬測試網頁】點擊下方按鈕可體驗「結帳跳轉」流程</p>
        </div>
    </section>

    <section class="wrap">
        <div class="style-grid">
            <div class="style-card">
                <h3>灰灰藍恐龍</h3>
                <p>售價：NT$ 1,680</p>
                <!-- 模擬 POST 到我們的 API -->
                <form action="/api/checkout" method="POST">
                    <input type="hidden" name="productId" value="HIBOU_BLUE">
                    <input type="hidden" name="style" value="灰灰藍恐龍">
                    <button type="submit" class="btn-buy">立即模擬購買 (綠界測試)</button>
                </form>
            </div>
            <div class="style-card">
                <h3>花花粉恐龍</h3>
                <p>售價：NT$ 1,680</p>
                <!-- 綠界測試 -->
                <form action="/api/checkout" method="POST" style="margin-bottom: 10px;">
                    <input type="hidden" name="productId" value="HIBOU_PINK">
                    <input type="hidden" name="style" value="花花粉恐龍">
                    <button type="submit" class="btn-buy">立即模擬購買 (綠界測試)</button>
                </form>
                <!-- LINE Pay 測試 -->
                <form action="/api/checkout-linepay" method="POST">
                    <input type="hidden" name="productId" value="HIBOU_PINK">
                    <input type="hidden" name="style" value="花花粉恐龍">
                    <button type="submit" class="btn-buy" style="background: #00B900;">LINE Pay 模擬購買</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 HiBOU Tech Simulation</p>
    </footer>

    <div id="test-console">
        > [System] 模擬後台已就緒...<br>
        > [System] 等待使用者觸發結帳...
    </div>

</body>
</html>
